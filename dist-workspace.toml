[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Homebrew formula is generated as a release asset by the `homebrew`
# installer above, but we do NOT auto-publish it to a tap. Instead the
# generated `abtop.rb` is downloaded after each release and committed
# to `Formula/abtop.rb` in this repo. Users tap via the URL form:
#   brew tap abhijit-s/abtop https://github.com/abhijit-s/abtop
# This keeps the release flow PAT-free and avoids cross-repo pushes.
publish-jobs = []
